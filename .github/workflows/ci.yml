name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with Ruff
        run: ruff check backend/
      - name: Run backend tests
        env:
          SHOPIFY_STORE_DOMAIN: test.myshopify.com
          DB_BACKEND: sqlite
          SQLITE_PATH: /tmp/vastra_ci.db
          GROQ_API_KEY: test-key
          CORS_ORIGIN: http://localhost:5173
        run: pytest backend/tests/ --ignore=backend/tests/evals/

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  evals:
    name: Trajectory Evaluation Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run evaluation suite
        env:
          SHOPIFY_STORE_DOMAIN: test.myshopify.com
          DB_BACKEND: sqlite
          SQLITE_PATH: /tmp/vastra_ci.db
          GROQ_API_KEY: test-key
        run: pytest backend/tests/evals/

  mcp-contract:
    name: MCP Contract Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run MCP client tests
        env:
          SHOPIFY_STORE_DOMAIN: test.myshopify.com
          DB_BACKEND: sqlite
          SQLITE_PATH: /tmp/vastra_ci.db
          GROQ_API_KEY: test-key
        run: pytest backend/tests/test_mcp_client.py
