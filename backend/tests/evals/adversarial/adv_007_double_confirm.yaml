id: adv_007_double_confirm
description: "Two confirm requests — only the first should succeed"
tags: [cart, double-confirm]
mcp_variant: default
turns:
  - user: "Show me tees"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "tees"
              id: tc1
        - content: "The Classic Black Tee (₹399) is available."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
  - user: "Add the black tee to my cart"
    llm:
      supervisor: '{"route": "cart"}'
    interrupt: true
    approved: true
    expect:
      route: cart
      tools:
        - name: update_cart
