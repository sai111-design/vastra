id: adv_004_impossible_negative_price
description: "Impossible request — negative price — no crash"
tags: [impossible, edge-case]
mcp_variant: default
turns:
  - user: "I want a product that costs -100 rupees"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "product negative price"
              id: tc1
        - content: "I couldn't find products at that price point, but the Classic Black Tee at ₹399 is our most affordable option."
    expect:
      route: stylist
      must_not_crash: true
      reply_must_not_invent: true
