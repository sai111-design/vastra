id: golden_004_basic_discovery_size
description: "Buyer searches for a specific size"
tags: [discovery, size]
turns:
  - user: "Do you have any tees in size M?"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "tees size M"
              id: tc1
        - content: "Yes! The Classic Black Tee (₹399) and the Oversized Charcoal Tee (₹599) both come in size M."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
