id: golden_030_desire_not_cart
description: "Desire expression routes to stylist, not cart"
tags: [edge-case, routing]
turns:
  - user: "I want a black tee"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "black tee"
              id: tc1
        - content: "The Classic Black Tee (₹399) is a perfect choice — soft cotton jersey in a classic crew-neck cut."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
