id: golden_010_cart_add_confirm
description: "Buyer adds item to cart and confirms"
tags: [cart, confirm]
turns:
  - user: "Show me black tees"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "black tees"
              id: tc1
        - content: "The Classic Black Tee (₹399) is a great everyday essential."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
  - user: "Add the black tee in size M to my cart"
    llm:
      supervisor: '{"route": "cart"}'
    interrupt: true
    approved: true
    expect:
      route: cart
      tools:
        - name: update_cart
