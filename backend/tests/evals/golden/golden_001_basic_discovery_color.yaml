id: golden_001_basic_discovery_color
description: "Buyer searches for black t-shirts"
tags: [discovery, color]
turns:
  - user: "Show me black t-shirts"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "black t-shirts"
              id: tc1
        - content: "I found the Classic Black Tee (₹399) — a soft cotton crew-neck perfect for everyday wear!"
    expect:
      route: stylist
      tools:
        - name: search_catalog
          args_contains:
            query: "black"
      reply_must_not_invent: true
