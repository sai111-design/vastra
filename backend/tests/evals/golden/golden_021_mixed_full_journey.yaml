id: golden_021_mixed_full_journey
description: "Full shopping journey: greet → browse → details → cart → checkout"
tags: [mixed, full-journey]
turns:
  - user: "Hi there!"
    llm:
      supervisor: '{"route": "respond"}'
    expect:
      route: respond
  - user: "Show me some tees"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "tees"
              id: tc1
        - content: "The Classic Black Tee (₹399) and the Oversized Charcoal Tee (₹599) are available."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
  - user: "Add the black tee in M"
    llm:
      supervisor: '{"route": "cart"}'
    interrupt: true
    approved: true
    expect:
      route: cart
      tools:
        - name: update_cart
