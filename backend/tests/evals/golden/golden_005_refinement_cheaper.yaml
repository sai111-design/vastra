id: golden_005_refinement_cheaper
description: "Buyer asks for cheaper options after initial search"
tags: [refinement, budget]
turns:
  - user: "Show me some tees"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "tees"
              id: tc1
        - content: "Here are some options — the Classic Black Tee (₹399) and the Oversized Charcoal Tee (₹599)."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
  - user: "Anything cheaper?"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "tees budget cheap affordable"
              id: tc2
        - content: "The most affordable option is the Classic Black Tee at ₹399 — great value for a soft cotton crew-neck."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
