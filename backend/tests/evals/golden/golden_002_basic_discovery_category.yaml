id: golden_002_basic_discovery_category
description: "Buyer searches by garment category"
tags: [discovery, category]
turns:
  - user: "I'm looking for t-shirts"
    llm:
      supervisor: '{"route": "stylist"}'
      agent:
        - tool_calls:
            - name: search_catalog
              args:
                query: "t-shirts"
              id: tc1
        - content: "Here are some great t-shirts! The Classic Black Tee (₹399) is a wardrobe essential, and the Oversized Charcoal Tee (₹599) offers a relaxed drop-shoulder fit."
    expect:
      route: stylist
      tools:
        - name: search_catalog
      reply_must_not_invent: true
