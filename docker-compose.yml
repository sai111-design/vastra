services:
  postgres:
    image: postgres:16-alpine
    ports:
      # High host port avoids clashing with native PostgreSQL installs (5432/5433).
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vastra
      POSTGRES_USER: vastra
      POSTGRES_PASSWORD: vastra
  
  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file: .env
    volumes:
      - .:/app
  
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app

volumes:
  postgres_data:
