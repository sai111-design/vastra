services:
  postgres:
    image: postgres:16-alpine
    ports:
      # High host port avoids clashing with native PostgreSQL installs (5432/5433);
      # loopback-only so the dev-credentialed DB is never exposed on the LAN.
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vastra
      POSTGRES_USER: vastra
      POSTGRES_PASSWORD: vastra
    # Backend must not start querying until Postgres is accepting connections —
    # without this the first few requests race the DB startup and crash.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vastra -d vastra"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override the .env's host-side DATABASE_URL (which points at
      # 127.0.0.1:55432 for native Windows uvicorn). Inside docker-compose,
      # Postgres is reachable as the service name `postgres` on its
      # internal port 5432.
      DATABASE_URL: postgresql://vastra:vastra@postgres:5432/vastra
      # CORS for the vite dev server running in the sibling `frontend` container.
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - .:/app
  
  frontend:
    # node:20-slim (Debian/glibc) avoids the rollup musl-binary / npm
    # optional-deps bug that hits node:20-alpine when the lockfile was
    # generated on a different libc.
    image: node:20-slim
    working_dir: /app/frontend
    # `npm install` (not `npm ci`) is more forgiving with platform-specific
    # optional deps; vite needs `--host 0.0.0.0` to be reachable from the
    # host across the container boundary.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # vite.config.js reads this; inside compose the backend is at the
      # service name, not localhost (which would loop back to this container).
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      # Mount only the frontend source — and keep node_modules INSIDE the
      # container via an anonymous volume so Windows binaries on the host
      # can never shadow the Linux ones installed by the container.
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data:
